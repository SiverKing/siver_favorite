<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Siver 导航</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <meta content="telephone=no,email=no" name="format-detection">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="keywords" content="网址导航" />
    <meta name="description" content="一个简单美观可自定义的网址导航" />
    <link rel="shortcut icon" id="favicon-link" href="./get_favicon.php">
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <style>
        /* ===== 搜索栏重写 ===== */
        .search-area {
            width: 100%;
            padding-top: 80px;
            padding-bottom: 20px;
            position: relative;
            z-index: 10000;
        }
        .search-inner {
            width: min(580px, 90vw);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* 引擎切换 */
        .engine-toggle {
            display: flex;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 3px;
            backdrop-filter: blur(8px);
        }
        .engine-btn {
            padding: 5px 20px;
            border-radius: 17px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            font-family: "微软雅黑", sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .engine-btn.active {
            background: rgba(255,255,255,0.92);
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .engine-btn:not(.active):hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* 搜索表单 */
        .search-form {
            width: 100%;
            display: flex;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .search-input-wrap {
            flex: 1;
            position: relative;
            display: flex;
        }
        #search-kw {
            flex: 1;
            border: none;
            padding: 13px 40px 13px 16px;
            font-size: 15px;
            font-family: "微软雅黑", sans-serif;
            background: rgba(255,255,255,0.93);
            color: #333;
            outline: none;
            min-width: 0;
        }
        #search-kw::placeholder { color: #aaa; }
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px; height: 20px;
            background: rgba(0,0,0,0.15);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
            line-height: 1;
        }
        .search-clear.visible { display: flex; }
        .search-clear:hover { background: rgba(0,0,0,0.25); }
        #search-submit {
            padding: 0 24px;
            background: #3a7bd5;
            color: #fff;
            border: none;
            font-size: 15px;
            font-family: "微软雅黑", sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        #search-submit:hover { background: #2d6bc4; }

        /* 搜索建议 */
        .suggest-list {
            width: 100%;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            overflow: hidden;
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            z-index: 10010;
        }
        .suggest-list.show { display: block; }
        .suggest-item {
            padding: 9px 16px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            font-family: "微软雅黑", sans-serif;
        }
        .suggest-item:hover, .suggest-item.active { background: #f5f5f5; }
        .search-input-wrap { position: relative; }

        @media screen and (max-width: 640px) {
            .search-area { padding-top: 50px; }
            #search-kw { font-size: 14px; padding: 11px 36px 11px 12px; }
            #search-submit { padding: 0 16px; font-size: 14px; }
        }

        /* ===== 链接区域响应式 ===== */
        @media screen and (max-width: 900px) {
            .content {
                width: 100% !important;
                padding: 0 12px !important;
                box-sizing: border-box;
                margin: 16px auto !important;
            }
            .jianjie {
                column-count: 2 !important;
                column-gap: 16px !important;
                margin: 16px auto !important;
            }
        }

        @media screen and (max-width: 480px) {
            .content {
                width: 100% !important;
                padding: 0 8px !important;
                box-sizing: border-box;
                margin: 10px auto !important;
            }
            .jianjie {
                column-count: 1 !important;
                column-gap: 0 !important;
                margin: 10px auto !important;
            }
            .jj-list {
                margin-bottom: 14px !important;
            }
            .jj-list-con li {
                width: calc(50% - 8px) !important;
            }
            .frosted {
                padding: 8px !important;
            }
        }
    </style>
</head>

<body>
<!-- 右上角登录/用户状态栏 -->
<div id="auth-bar" style="position:fixed;top:14px;right:18px;z-index:99999;display:flex;align-items:center;gap:8px;">
    <button id="btn-login-trigger" onclick="openLoginModal()"
        style="background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.3);
               border-radius:20px;color:#fff;font-size:13px;font-family:'微软雅黑',sans-serif;
               padding:6px 16px;cursor:pointer;transition:background 0.2s;">登录</button>
    <span id="auth-username" style="display:none;color:rgba(255,255,255,0.9);font-size:13px;
          font-family:'微软雅黑',sans-serif;background:rgba(255,255,255,0.12);border-radius:20px;
          padding:4px 12px;"></span>
    <a id="btn-goto-admin" href="./admin/index.html" style="display:none;background:rgba(255,255,255,0.18);
       backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.3);border-radius:20px;color:#fff;
       font-size:13px;font-family:'微软雅黑',sans-serif;padding:6px 16px;text-decoration:none;
       transition:background 0.2s;">进入后台</a>
    <button id="btn-logout-main" onclick="doMainLogout()" style="display:none;background:rgba(255,255,255,0.1);
        backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:rgba(255,255,255,0.7);
        font-size:13px;font-family:'微软雅黑',sans-serif;padding:6px 14px;cursor:pointer;transition:background 0.2s;">退出</button>
</div>

<!-- 登录弹窗 -->
<div id="login-modal-overlay" onclick="handleOverlayClick(event)"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
           z-index:100000;align-items:center;justify-content:center;">
    <div id="login-modal-box" style="position:relative;background:#13151f;border:1px solid #252840;
         border-radius:14px;padding:32px 36px;width:340px;max-width:90vw;box-sizing:border-box;">
        <button onclick="closeLoginModal()"
            style="position:absolute;top:12px;right:16px;background:none;border:none;
                   color:#555a7a;font-size:22px;cursor:pointer;line-height:1;">×</button>
        <h3 style="color:#e8eaf6;font-size:18px;margin:0 0 20px;text-align:center;font-family:'微软雅黑',sans-serif;">登录</h3>
        <div style="margin-bottom:12px;">
            <label style="color:#8b90b8;font-size:12px;display:block;margin-bottom:6px;font-family:'微软雅黑',sans-serif;">用户名</label>
            <input type="text" id="main-login-user" placeholder="用户名" autocomplete="username"
                style="width:100%;background:#1a1d2e;border:1px solid #252840;border-radius:6px;color:#e8eaf6;
                       padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box;font-family:'微软雅黑',sans-serif;">
        </div>
        <div style="margin-bottom:14px;">
            <label style="color:#8b90b8;font-size:12px;display:block;margin-bottom:6px;font-family:'微软雅黑',sans-serif;">密码</label>
            <input type="password" id="main-login-pass" placeholder="密码" autocomplete="current-password"
                style="width:100%;background:#1a1d2e;border:1px solid #252840;border-radius:6px;color:#e8eaf6;
                       padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box;font-family:'微软雅黑',sans-serif;">
        </div>
        <div style="display:flex;align-items:center;margin-bottom:12px;gap:8px;">
            <input type="checkbox" id="main-remember-me"
                style="width:16px;height:16px;cursor:pointer;accent-color:#7c6ef0;">
            <label for="main-remember-me" id="main-remember-label"
                style="color:#8b90b8;font-size:12px;cursor:pointer;font-family:'微软雅黑',sans-serif;">记住我</label>
            <span id="main-remember-hint" style="display:none;color:#7c6ef0;font-size:11px;font-family:'微软雅黑',sans-serif;"></span>
        </div>
        <div id="main-login-error" style="display:none;color:#f87171;font-size:13px;margin-bottom:10px;
             text-align:center;font-family:'微软雅黑',sans-serif;"></div>
        <button onclick="submitMainLogin()"
            style="width:100%;background:linear-gradient(135deg,#5b8dee,#7c6ef0);border:none;border-radius:6px;
                   color:#fff;font-size:14px;font-weight:600;padding:11px;cursor:pointer;
                   font-family:'微软雅黑',sans-serif;transition:opacity 0.2s;">登 录</button>
        <p style="text-align:center;color:#555a7a;font-size:12px;margin:14px 0 0;font-family:'微软雅黑',sans-serif;">
            若需要注册请发邮件给站长
        </p>
    </div>
</div>

<div class="wrapper">
    <!-- 搜索栏 -->
    <div class="search-area">
        <div class="search-inner">
            <div class="engine-toggle">
                <button class="engine-btn active" data-url="https://www.bing.com/search" data-param="q">Bing</button>
                <button class="engine-btn" data-url="https://www.google.com/search" data-param="q">Google</button>
            </div>
            <form class="search-form" id="search-form" action="https://www.bing.com/search" target="_blank">
                <div class="search-input-wrap">
                    <input type="text" name="q" id="search-kw" placeholder="搜索..." autocomplete="off">
                    <button type="button" class="search-clear" id="search-clear">×</button>
                    <div class="suggest-list" id="suggest-list"></div>
                </div>
                <input type="hidden" id="search-param-name" value="q">
                <button type="submit" id="search-submit">搜 索</button>
            </form>
        </div>
    </div>

    <!-- 内容 -->
    <div class="body">
        <div class="content">
            <div class="frosted">
                <div class="jianjie" id="links-container">
                    <!-- 由JS动态渲染 -->

<script type="text/javascript" src="js/jquery.js"></script>
<script>
// ===== 渲染链接 =====
function renderLinks(data) {
    const container = document.getElementById('links-container');
    if (!data || data.length === 0) {
        container.innerHTML = '<div style="color:rgba(255,255,255,0.7);text-align:center;padding:40px 0;">暂无收藏数据</div>';
        return;
    }
    let html = '';
    data.forEach(group => {
        if (!group.category || !group.links || group.links.length === 0) return;
        html += `<div class="jj-list">
    <div class="jj-list-tit">${escHtml(group.category)}</div>
    <ul class="jj-list-con">`;
        group.links.forEach(link => {
            html += `\n        <li><a href="${escAttr(link.url)}" class="link-3" target="_blank" rel="nofollow">${escHtml(link.name)}</a></li>`;
        });
        html += `\n    </ul>\n</div>\n`;
    });
    container.innerHTML = html;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

// ===== 背景 =====
function applyBackground() {
    fetch('./admin/get_bg.php?_t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            if (data.bg) {
                document.body.style.backgroundImage = 'url(' + data.bg + ')';
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundAttachment = 'fixed';
            } else {
                document.body.style.backgroundImage = '';
            }
        })
        .catch(() => {});
}

// ===== 初始化：检查登录状态并加载数据 =====
function initPage() {
    applyBackground();
    fetch('./admin/auth_check.php')
        .then(r => r.json())
        .then(auth => {
            updateAuthBar(auth);
            if (auth.loggedin) {
                fetch('./admin/get_user_data.php?_t=' + Date.now())
                    .then(r => r.json())
                    .then(data => renderLinks(data))
                    .catch(() => renderLinksError());
            } else {
                fetch('./data.json?_t=' + Date.now())
                    .then(r => r.json())
                    .then(data => renderLinks(data))
                    .catch(() => renderLinksError());
            }
        })
        .catch(() => {
            // PHP 不可用（如 file:// 打开），回退到公共数据
            fetch('./data.json?_t=' + Date.now())
                .then(r => r.json())
                .then(data => renderLinks(data))
                .catch(() => renderLinksError());
        });
}

function renderLinksError() {
    document.getElementById('links-container').innerHTML =
        '<div style="color:rgba(255,255,255,0.6);text-align:center;padding:40px 0;">数据加载失败，请刷新重试</div>';
}

function updateAuthBar(auth) {
    const btnLogin  = document.getElementById('btn-login-trigger');
    const nameSpan  = document.getElementById('auth-username');
    const btnAdmin  = document.getElementById('btn-goto-admin');
    const btnLogout = document.getElementById('btn-logout-main');
    if (auth.loggedin) {
        btnLogin.style.display  = 'none';
        nameSpan.textContent    = auth.user;
        nameSpan.style.display  = '';
        btnAdmin.style.display  = '';
        btnLogout.style.display = '';
    } else {
        btnLogin.style.display  = '';
        nameSpan.style.display  = 'none';
        btnAdmin.style.display  = 'none';
        btnLogout.style.display = 'none';
    }
}

// ===== 登录弹窗 =====
let _sessionKeepDays = 0;
function openLoginModal() {
    document.getElementById('login-modal-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('main-login-user').focus(), 50);
    // 获取会话保持天数配置
    fetch('./admin/get_session_config.php')
        .then(r => r.json())
        .then(cfg => {
            _sessionKeepDays = parseInt(cfg.keep_login_days) || 0;
            const checkbox = document.getElementById('main-remember-me');
            const hint = document.getElementById('main-remember-hint');
            if (_sessionKeepDays > 0) {
                checkbox.parentElement.style.display = 'flex';
                const updateHint = () => {
                    if (checkbox.checked) {
                        hint.textContent = '（登录状态将保持 ' + _sessionKeepDays + ' 天）';
                        hint.style.display = 'inline';
                    } else {
                        hint.style.display = 'none';
                    }
                };
                checkbox.onchange = updateHint;
            } else {
                checkbox.parentElement.style.display = 'none';
            }
        })
        .catch(() => {
            document.getElementById('main-remember-me').parentElement.style.display = 'none';
        });
}
function closeLoginModal() {
    document.getElementById('login-modal-overlay').style.display = 'none';
    document.getElementById('main-login-error').style.display = 'none';
    document.getElementById('main-login-user').value = '';
    document.getElementById('main-login-pass').value = '';
    document.getElementById('main-remember-me').checked = false;
    document.getElementById('main-remember-hint').style.display = 'none';
}
function handleOverlayClick(e) {
    if (e.target === document.getElementById('login-modal-overlay')) closeLoginModal();
}

function submitMainLogin() {
    const user = document.getElementById('main-login-user').value.trim();
    const pass = document.getElementById('main-login-pass').value;
    const rememberMe = document.getElementById('main-remember-me').checked ? '1' : '0';
    const errEl = document.getElementById('main-login-error');
    errEl.style.display = 'none';
    if (!user || !pass) { errEl.textContent = '请输入用户名和密码'; errEl.style.display = 'block'; return; }
    fetch('./admin/user_login.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'username=' + encodeURIComponent(user) + '&password=' + encodeURIComponent(pass) + '&remember_me=' + rememberMe
    })
    .then(r => r.json())
    .then(result => {
        if (result.status === 'success') {
            closeLoginModal();
            applyBackground();
            initPage();
        } else {
            errEl.textContent = result.message || '用户名或密码错误';
            errEl.style.display = 'block';
        }
    })
    .catch(() => { errEl.textContent = '登录失败，请重试'; errEl.style.display = 'block'; });
}

// Enter 键提交登录
document.getElementById('main-login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitMainLogin();
});
document.getElementById('main-login-user').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('main-login-pass').focus();
});

function doMainLogout() {
    fetch('./admin/logout.php', {method: 'POST'}).then(() => initPage());
}

// 启动
initPage();


// ===== 搜索引擎切换 =====
const engineBtns = document.querySelectorAll('.engine-btn');
const searchForm = document.getElementById('search-form');
const searchKw = document.getElementById('search-kw');

// 从localStorage读取上次选择
const savedEngine = localStorage.getItem('search_engine');
if (savedEngine) {
    engineBtns.forEach(btn => {
        const match = btn.dataset.url === savedEngine;
        btn.classList.toggle('active', match);
        if (match) {
            searchForm.action = btn.dataset.url;
            searchKw.name = btn.dataset.param;
        }
    });
}

engineBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        engineBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        searchForm.action = btn.dataset.url;
        searchKw.name = btn.dataset.param;
        localStorage.setItem('search_engine', btn.dataset.url);
        searchKw.focus();
    });
});

// ===== 清空按钮 =====
const clearBtn = document.getElementById('search-clear');
searchKw.addEventListener('input', () => {
    clearBtn.classList.toggle('visible', searchKw.value.length > 0);
    if (!searchKw.value) hideSuggest();
});
clearBtn.addEventListener('click', () => {
    searchKw.value = '';
    clearBtn.classList.remove('visible');
    hideSuggest();
    searchKw.focus();
});

// ===== 搜索建议（百度JSONP，中文搜索适用）=====
const suggestList = document.getElementById('suggest-list');
let suggestItems = [];
let activeIndex = -1;

function hideSuggest() {
    suggestList.classList.remove('show');
    suggestItems = [];
    activeIndex = -1;
}

window._baiduSuggestCb = function(data) {
    const list = data && data.s ? data.s : [];
    if (!list.length || !searchKw.value.trim()) { hideSuggest(); return; }
    suggestItems = list.slice(0, 8);
    activeIndex = -1;
    suggestList.innerHTML = suggestItems.map((s, i) =>
        `<div class="suggest-item" data-i="${i}">${escHtml(s)}</div>`
    ).join('');
    suggestList.classList.add('show');
};

let suggestTimer;
searchKw.addEventListener('input', () => {
    clearTimeout(suggestTimer);
    const val = searchKw.value.trim();
    if (!val) { hideSuggest(); return; }
    suggestTimer = setTimeout(() => {
        const s = document.createElement('script');
        s.src = 'https://sp0.baidu.com/5a1Fazu8AA54nxGko9WTAnF6hhy/su?wd=' + encodeURIComponent(val) + '&cb=_baiduSuggestCb';
        document.body.appendChild(s);
        s.onload = s.onerror = () => s.remove();
    }, 200);
});

suggestList.addEventListener('click', e => {
    const item = e.target.closest('.suggest-item');
    if (!item) return;
    searchKw.value = suggestItems[+item.dataset.i];
    hideSuggest();
    searchForm.submit();
});

document.addEventListener('keydown', e => {
    if (!suggestList.classList.contains('show')) return;
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, suggestItems.length - 1);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, -1);
    } else if (e.key === 'Enter' && activeIndex >= 0) {
        e.preventDefault();
        searchKw.value = suggestItems[activeIndex];
        hideSuggest();
        searchForm.submit();
        return;
    } else if (e.key === 'Escape') {
        hideSuggest(); return;
    } else return;
    document.querySelectorAll('.suggest-item').forEach((el, i) => {
        el.classList.toggle('active', i === activeIndex);
    });
    if (activeIndex >= 0) searchKw.value = suggestItems[activeIndex];
});

document.addEventListener('click', e => {
    if (!e.target.closest('.search-input-wrap')) hideSuggest();
});

searchForm.addEventListener('submit', () => hideSuggest());
</script>
</body>
</html>
